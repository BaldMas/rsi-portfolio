<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rotation Analyzer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', monospace;
  background: #0d1117; color: #c9d1d9;
  padding: 20px; min-height: 100vh;
}
h1 { color: #58a6ff; font-size: 1.4rem; margin-bottom: 4px; }
.subtitle { color: #8b949e; font-size: 0.82rem; margin-bottom: 20px; }
.search-wrap {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 24px; flex-wrap: wrap;
}
.search-wrap input {
  background: #161b22; border: 1px solid #30363d;
  color: #c9d1d9; padding: 10px 16px;
  border-radius: 8px; font-size: 1.1rem; width: 160px;
  text-transform: uppercase; outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: #58a6ff; }
.ticker-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  background: #21262d; border: 1px solid #30363d;
  color: #8b949e; padding: 4px 10px; border-radius: 20px;
  font-size: 0.75rem; cursor: pointer; transition: all .15s;
  user-select: none;
}
.chip:hover { background: #30363d; color: #c9d1d9; border-color: #58a6ff; }
.chip.g1 { border-color: #1f6feb; color: #58a6ff; }
.chip.g2 { border-color: #238636; color: #3fb950; }
.chip.g3 { border-color: #9e6a03; color: #d29922; }
.chip.g4 { border-color: #da3633; color: #f85149; }
.chip.g5,.chip.dead { border-color: #6e40c9; color: #a371f7; }
/* Target card */
#target-card {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 18px 20px; margin-bottom: 24px;
  display: none;
}
#target-card.visible { display: block; }
.target-header {
  display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px;
  flex-wrap: wrap;
}
.target-ticker { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
.target-score { font-size: 1rem; color: #3fb950; }
.target-group { font-size: 0.85rem; padding: 3px 10px; border-radius: 12px; }
.target-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
.meta-item { font-size: 0.8rem; }
.meta-label { color: #8b949e; }
.meta-val { color: #c9d1d9; font-weight: 600; }
.target-thesis { font-size: 0.82rem; color: #8b949e; line-height: 1.5; }
.va-tag {
  display: inline-block; background: #1f3d2e; border: 1px solid #238636;
  color: #3fb950; padding: 2px 8px; border-radius: 10px;
  font-size: 0.72rem; margin-top: 6px;
}
/* Results table */
#results { display: none; }
#results.visible { display: block; }
.section-title {
  color: #8b949e; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 10px; margin-top: 20px;
}
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
thead th {
  background: #161b22; color: #8b949e; font-weight: 600;
  padding: 8px 10px; text-align: left; border-bottom: 1px solid #21262d;
  position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none;
  white-space: nowrap;
}
thead th:hover { color: #c9d1d9; }
thead th.sorted { color: #58a6ff; }
tbody tr { border-bottom: 1px solid #21262d; transition: background .1s; }
tbody tr:hover { background: #161b22; }
td { padding: 8px 10px; vertical-align: middle; }
.td-ticker { font-weight: 700; font-size: 0.9rem; }
.td-value { font-variant-numeric: tabular-nums; }
.pnl-pos { color: #3fb950; }
.pnl-neg { color: #f85149; }
.score-bar {
  display: flex; align-items: center; gap: 6px;
}
.bar {
  height: 6px; border-radius: 3px; background: #21262d; width: 60px; position: relative;
}
.bar-fill { height: 100%; border-radius: 3px; }
.g1-c { color: #1f6feb; } .g1-b { background: #1f6feb; }
.g2-c { color: #3fb950; } .g2-b { background: #3fb950; }
.g3-c { color: #d29922; } .g3-b { background: #d29922; }
.g4-c { color: #f85149; } .g4-b { background: #f85149; }
.g5-c { color: #a371f7; } .g5-b { background: #a371f7; }
.badge {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 0.7rem; font-weight: 600; white-space: nowrap;
}
.badge-cut { background: #3d1c1c; color: #f85149; border: 1px solid #da3633; }
.badge-hold { background: #1c2d1c; color: #3fb950; border: 1px solid #238636; }
.badge-dead { background: #2d1c3d; color: #a371f7; border: 1px solid #6e40c9; }
.badge-warn { background: #2d2200; color: #d29922; border: 1px solid #9e6a03; }
.delta-pos { color: #3fb950; font-weight: 600; }
.delta-neg { color: #f85149; font-weight: 600; }
.td-screen { font-size: 0.72rem; color: #8b949e; }
.td-va { font-size: 0.72rem; color: #3fb950; }
.td-thesis { font-size: 0.72rem; color: #6e7681; max-width: 260px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.priority-star { color: #d29922; }
.empty-state {
  text-align: center; color: #6e7681; padding: 40px 0; font-size: 0.9rem;
}
.totals-bar {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px 16px; margin-bottom: 16px;
  display: flex; gap: 24px; flex-wrap: wrap;
}
.total-item { font-size: 0.82rem; }
.updated { color: #6e7681; font-size: 0.72rem; margin-top: 16px; }
/* Zone filter buttons */
.zone-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.zone-btn {
  padding: 5px 14px; border-radius: 20px; border: 1px solid #30363d;
  background: #21262d; color: #8b949e; cursor: pointer; font-size: 0.8rem;
  font-weight: 600; transition: all .15s; user-select: none;
}
.zone-btn:hover { background: #30363d; }
.zone-btn.active-red   { background: #3d1212; border-color: #f85149; color: #f85149; }
.zone-btn.active-yellow { background: #2d2208; border-color: #d29922; color: #d29922; }
.zone-btn.active-green  { background: #0d2016; border-color: #3fb950; color: #3fb950; }
.zone-btn.active-all   { background: #161b22; border-color: #58a6ff; color: #58a6ff; }
.zone-count { font-size: 0.72rem; opacity: .75; margin-left: 3px; }
/* TA metric cells */
.rsi-lo  { color: #3fb950; font-weight: 600; }
.rsi-hi  { color: #f85149; font-weight: 600; }
.rsi-mid { color: #c9d1d9; }
.rsi-na  { color: #6e7681; }
.rs-pos  { color: #3fb950; }
.rs-neg  { color: #f85149; }
.rs-na   { color: #6e7681; }
.z-hi    { color: #f85149; font-weight: 600; }
.z-lo    { color: #3fb950; font-weight: 600; }
.z-mid   { color: #c9d1d9; }
.sig-up  { color: #3fb950; }
.sig-dn  { color: #f85149; }
.sig-ob  { color: #f85149; font-weight: 600; }
.sig-os  { color: #3fb950; font-weight: 600; }
.sig-bx  { color: #8b949e; }
.sig-na  { color: #6e7681; }
/* Numeric signal (как на главной) */
.sig-urgent  { color: #ff7b00; font-weight: 800; }
.sig-rotate  { color: #3fb950; font-weight: 700; }
.sig-watch   { color: #d29922; }
.sig-wait    { color: #58a6ff; }
.sig-neutral { color: #8b949e; }
/* Price table */
#price-table-wrap { margin-bottom: 28px; }
#price-table-wrap .pt-title {
  color: #8b949e; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 8px;
}
#price-table thead th { white-space: nowrap; }
.pt-ticker { font-weight: 700; font-size: 0.88rem; }
.pt-price  { font-variant-numeric: tabular-nums; color: #c9d1d9; }
.ath-near  { color: #f85149; }
.ath-mid   { color: #d29922; }
.ath-far   { color: #3fb950; }
</style>
</head>
<body>
<h1>Rotation Analyzer</h1>
<p class="subtitle">Вводи целевой тикер - получи список позиций для перелива</p>

<div class="search-wrap">
  <input type="text" id="ticker-input" placeholder="AAVE..." maxlength="10"
         autocomplete="off" spellcheck="false">
  <div class="ticker-chips" id="chips"></div>
</div>

<div id="price-table-wrap">
  <div class="pt-title">Цены портфеля</div>
  <table id="price-table">
    <thead>
      <tr>
        <th data-pt="ticker">Тикер</th>
        <th data-pt="price">Цена</th>
        <th data-pt="chg_1d">1D</th>
        <th data-pt="chg_7d">7D</th>
        <th data-pt="chg_30d">1M</th>
        <th data-pt="chg_1y">1Y</th>
        <th data-pt="from_ath">от ATH</th>
      </tr>
    </thead>
    <tbody id="pt-body"></tbody>
  </table>
</div>

<div id="target-card">
  <div class="target-header">
    <span class="target-ticker" id="t-name"></span>
    <span class="target-score" id="t-score"></span>
    <span class="target-group badge" id="t-group"></span>
  </div>
  <div class="target-meta" id="t-meta"></div>
  <div id="t-thesis" class="target-thesis"></div>
  <div id="t-va"></div>
</div>

<div id="results">
  <div id="totals-bar" class="totals-bar"></div>
  <div class="zone-filters">
    <span style="color:#8b949e;font-size:.78rem;margin-right:2px">Зона:</span>
    <button class="zone-btn active-all" data-zone="all" onclick="setZone('all')">Все <span class="zone-count" id="cnt-all"></span></button>
    <button class="zone-btn" data-zone="red"    onclick="setZone('red')">🔴 Красная <span class="zone-count" id="cnt-red"></span></button>
    <button class="zone-btn" data-zone="yellow" onclick="setZone('yellow')">🟡 Жёлтая <span class="zone-count" id="cnt-yellow"></span></button>
    <button class="zone-btn" data-zone="green"  onclick="setZone('green')">🟢 Зелёная <span class="zone-count" id="cnt-green"></span></button>
  </div>
  <div class="section-title" id="results-title"></div>
  <table id="rot-table">
    <thead>
      <tr>
        <th data-col="priority">#</th>
        <th data-col="ticker">Тикер</th>
        <th data-col="value">Стоимость</th>
        <th data-col="pnl_pct">P&amp;L %</th>
        <th data-col="group">Группа</th>
        <th data-col="score">Score</th>
        <th data-col="delta">Δ Score</th>
        <th data-col="rec">Статус</th>
        <th data-col="sig_num">Сигнал</th>
        <th data-col="rsi_1d">RSI 1D</th>
        <th data-col="rsi_1w">RSI 1W</th>
        <th data-col="z90">Z90</th>
        <th data-col="rs7">RS 7d</th>
        <th data-col="rs30">RS 30d</th>
        <th data-col="signal">Тренд</th>
        <th data-col="screen">Скрининг</th>
        <th data-col="value_accrual">Value accrual</th>
        <th data-col="thesis">Тезис</th>
      </tr>
    </thead>
    <tbody id="rot-body"></tbody>
  </table>
  <p class="updated" id="updated-ts"></p>
</div>

  if (v >= 0.01)  return '$' + v.toFixed(4);
  if (v >= 0.0001) return '$' + v.toFixed(5);
  return '$' + v.toFixed(8);
}
function fmt_pct(v) {
  if (v === null || v === undefined) return '<span style="color:#6e7681">-</span>';
  const cls = v >= 0 ? 'pnl-pos' : 'pnl-neg';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}
function fmt_ath(v) {
  if (v === null || v === undefined) return '<span style="color:#6e7681">-</span>';
  const cls = v >= -15 ? 'ath-near' : v >= -50 ? 'ath-mid' : 'ath-far';
  return `<span class="${cls}">${v.toFixed(1)}%</span>`;
}

let ptSort = {col: 'from_ath', dir: 1};

function renderPriceTable() {
  const rows = DATA.filter(d => d.price != null && d.value > 0);
  rows.sort((a, b) => {
    const va = a[ptSort.col] ?? (typeof a[ptSort.col] === 'string' ? '' : Infinity);
    const vb = b[ptSort.col] ?? (typeof b[ptSort.col] === 'string' ? '' : Infinity);
    if (typeof va === 'string') return ptSort.dir * va.localeCompare(vb);
    return ptSort.dir * ((va < vb) ? 1 : (va > vb) ? -1 : 0);
  });
  const GC_ = {1:'g1-c',2:'g2-c',3:'g3-c',4:'g4-c',5:'g5-c'};
  const tbody = document.getElementById('pt-body');
  tbody.innerHTML = rows.map(d => `
    <tr>
      <td class="pt-ticker ${GC_[d.group]||'g3-c'}">${d.ticker}</td>
      <td class="pt-price">${fmt_price(d.price)}</td>
      <td>${fmt_pct(d.chg_1d)}</td>
      <td>${fmt_pct(d.chg_7d)}</td>
      <td>${fmt_pct(d.chg_30d)}</td>
      <td>${fmt_pct(d.chg_1y)}</td>
      <td>${fmt_ath(d.from_ath)}</td>
    </tr>`).join('');
}

document.querySelectorAll('#price-table thead th').forEach(th => {
  th.onclick = () => {
    const col = th.dataset.pt;
    if (ptSort.col === col) ptSort.dir *= -1;
    else { ptSort.col = col; ptSort.dir = 1; }
    document.querySelectorAll('#price-table thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    renderPriceTable();
  };
});

renderPriceTable();
// ────────────────────────────────────────────────────────────────────────────

const GC = {1:'g1-c',2:'g2-c',3:'g3-c',4:'g4-c',5:'g5-c'};
const GB = {1:'g1-b',2:'g2-b',3:'g3-b',4:'g4-b',5:'g5-b'};
const GL = {1:'G1 Сильная',2:'G2 Надёжная',3:'G3 Нейтральная',4:'G4 Слабая',5:'G5 Опасная'};

function fmt_usd(v) {
  if (!v) return '$0';
  return '$' + Math.round(v).toLocaleString('ru');
}
function pnl_html(v) {
  const cls = v >= 0 ? 'pnl-pos' : 'pnl-neg';
  const sign = v >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(1)}%</span>`;
}
function score_html(score, group) {
  const pct = Math.round(score / 5);
  return `<div class="score-bar"><span class="${GC[group]||'g3-c'}" style="min-width:28px">${score}</span>
    <div class="bar"><div class="bar-fill ${GB[group]||'g3-b'}" style="width:${pct}%"></div></div></div>`;
}
function rsi_html(v) {
  if (v === null || v === undefined) return '<span class="rsi-na">-</span>';
  const cls = v >= 70 ? 'rsi-hi' : v <= 30 ? 'rsi-lo' : 'rsi-mid';
  return `<span class="${cls}">${v}</span>`;
}
function rs_html(v) {
  if (v === null || v === undefined) return '<span class="rs-na">-</span>';
  const cls = v >= 0 ? 'rs-pos' : 'rs-neg';
  const sign = v >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v}%</span>`;
}
function z90_html(v) {
  if (v === null || v === undefined) return '<span class="rsi-na">-</span>';
  const cls = v >= 1.5 ? 'z-hi' : v <= -1.5 ? 'z-lo' : 'z-mid';
  const sign = v >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v}</span>`;
}
function sig_num_html(v) {
  if (v === null || v === undefined) return '<span class="sig-neutral">-</span>';
  const cls = v >= 10 ? 'sig-urgent' : v >= 5 ? 'sig-rotate' : v >= 2 ? 'sig-watch' : v <= -5 ? 'sig-wait' : 'sig-neutral';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(1)}</span>`;
}
function signal_html(s) {
  const map = {
    'Перекуп': 'sig-ob', 'Перепрод': 'sig-os',
    'Восход': 'sig-up', 'Нисход': 'sig-dn',
    'Боковик': 'sig-bx', '-': 'sig-na',
  };
  const arrow = {
    'Восход': '↑ ', 'Нисход': '↓ ', 'Боковик': '↔ ',
    'Перекуп': '⚠ ', 'Перепрод': '✓ ',
  };
  return `<span class="${map[s]||'sig-na'}">${(arrow[s]||'')+s}</span>`;
}
function rec_badge(row) {
  if (row.is_dead) return '<span class="badge badge-dead">💀 DEAD</span>';
  const r = (row.rec || '').toUpperCase();
  if (r.includes('CUT')) return '<span class="badge badge-cut">CUT</span>';
  if (r.includes('HOLD')) return '<span class="badge badge-hold">HOLD</span>';
  if (r.includes('WARN')) return '<span class="badge badge-warn">WARN</span>';
  return `<span class="badge" style="background:#21262d">${row.rec||'?'}</span>`;
}

// Build lookup
const byTicker = {};
DATA.forEach(d => { byTicker[d.ticker] = d; });

function zoneOf(d) {
  if (d.group >= 4 || d.is_dead) return 'red';
  if (d.group === 3) return 'yellow';
  if (d.group <= 2) return 'green';
  return 'other';
}

let activeZone = 'all';
function setZone(z) {
  activeZone = z;
  document.querySelectorAll('.zone-btn').forEach(b => {
    b.className = 'zone-btn';
    if (b.dataset.zone === z) b.classList.add(`active-${z}`);
  });
  const cur = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (cur) render(cur);
}

// Chips
const input = document.getElementById('ticker-input');
const chipsEl = document.getElementById('chips');
// Sort chips: worst first
const chipOrder = [...DATA].sort((a,b) => b.rot_priority - a.rot_priority);
chipOrder.forEach(d => {
  const chip = document.createElement('span');
  const g = d.group;
  const cls = d.is_dead ? 'dead' : `g${g}`;
  chip.className = `chip ${cls}`;
  chip.textContent = d.ticker;
  chip.title = `G${g} Score:${d.score} ${d.pnl_pct > 0 ? '+' : ''}${d.pnl_pct}%`;
  chip.onclick = () => { input.value = d.ticker; render(d.ticker); };
  chipsEl.appendChild(chip);
});

input.addEventListener('input', () => { render(input.value.trim().toUpperCase()); });
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') render(input.value.trim().toUpperCase());
});

let sortCol = 'priority', sortDir = 1;
document.querySelectorAll('thead th').forEach(th => {
  th.onclick = () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    const cur = input.value.trim().toUpperCase();
    if (cur) render(cur);
  };
});

function render(target) {
  const card = document.getElementById('target-card');
  const res = document.getElementById('results');
  if (!target || target.length < 1) {
    card.classList.remove('visible');
    res.classList.remove('visible');
    return;
  }
  const tgt = byTicker[target];

  // Target card
  card.classList.add('visible');
  document.getElementById('t-name').textContent = target;
  document.getElementById('t-score').textContent = tgt
    ? `Score ${tgt.score}/500` : 'не в портфеле';
  const tg = document.getElementById('t-group');
  if (tgt) {
    tg.textContent = GL[tgt.group] || `G${tgt.group}`;
    tg.className = `target-group badge ${GC[tgt.group]||'g3-c'}`;
    tg.style.background = {1:'#0d2940',2:'#0d2618',3:'#2d2200',4:'#3d1c1c',5:'#2d1c3d'}[tgt.group]||'#21262d';
    tg.style.border = '1px solid currentColor';
  } else {
    tg.textContent = 'внешний'; tg.className = 'target-group badge';
  }
  const meta = document.getElementById('t-meta');
  if (tgt) {
    const items = [
      {label:'Стоимость', val: fmt_usd(tgt.value)},
      {label:'P&L', val: `${tgt.pnl_pct > 0 ? '+' : ''}${tgt.pnl_pct}%`},
      {label:'Скрининг', val: tgt.screen || '-'},
      {label:'Дата анализа', val: tgt.date || '-'},
      {label:'Статус', val: tgt.rec || '-'},
    ];
    meta.innerHTML = items.map(i =>
      `<div class="meta-item"><span class="meta-label">${i.label}: </span><span class="meta-val">${i.val}</span></div>`
    ).join('');
    document.getElementById('t-thesis').textContent = tgt.thesis || '';
    const vaEl = document.getElementById('t-va');
    if (tgt.value_accrual && tgt.value_accrual !== 'нет') {
      vaEl.innerHTML = `<span class="va-tag">✓ ${tgt.value_accrual}</span>`;
    } else {
      vaEl.innerHTML = `<span style="color:#6e7681;font-size:.72rem">Value accrual: нет</span>`;
    }
  } else {
    meta.innerHTML = '<span style="color:#6e7681">Тикер не найден в портфеле</span>';
    document.getElementById('t-thesis').textContent = '';
    document.getElementById('t-va').innerHTML = '';
  }

  // Candidates = all EXCEPT target with value > 0
  const allCandidates = DATA.filter(d => d.ticker !== target && d.value > 0);

  // Zone counts from ALL portfolio (not excluding target) - shows real distribution
  const allWithValue = DATA.filter(d => d.value > 0);
  ['all','red','yellow','green'].forEach(z => {
    const el = document.getElementById(`cnt-${z}`);
    if (!el) return;
    const n = z === 'all' ? allWithValue.length
      : allWithValue.filter(d => zoneOf(d) === z).length;
    el.textContent = n;
  });

  // Apply zone filter
  const candidates = activeZone === 'all' ? allCandidates
    : allCandidates.filter(d => zoneOf(d) === activeZone);
  const tScore = tgt ? tgt.score : 999;

  // Sort
  candidates.sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 'priority': va = a.rot_priority; vb = b.rot_priority; break;
      case 'ticker': va = a.ticker; vb = b.ticker; break;
      case 'value': va = b.value; vb = a.value; break;
      case 'pnl_pct': va = a.pnl_pct; vb = b.pnl_pct; break;
      case 'group': va = b.group; vb = a.group; break;
      case 'score': va = a.score; vb = b.score; break;
      case 'delta': va = (tScore - a.score); vb = (tScore - b.score); break;
      case 'rec': va = a.rec; vb = b.rec; break;
      case 'sig_num': va = a.sig_num ?? 0; vb = b.sig_num ?? 0; break;
      case 'signal': va = a.signal; vb = b.signal; break;
      case 'rsi_1d': va = a.rsi_1d ?? 50; vb = b.rsi_1d ?? 50; break;
      case 'rsi_1w': va = a.rsi_1w ?? 50; vb = b.rsi_1w ?? 50; break;
      case 'z90': va = a.z90 ?? 0; vb = b.z90 ?? 0; break;
      case 'rs7': va = a.rs7 ?? 0; vb = b.rs7 ?? 0; break;
      case 'rs30': va = a.rs30 ?? 0; vb = b.rs30 ?? 0; break;
      default: va = b.rot_priority; vb = a.rot_priority;
    }
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * ((va < vb) ? 1 : (va > vb) ? -1 : 0);
  });

  // Summary totals
  const totalVal = candidates.reduce((s,d) => s + d.value, 0);
  const cutVal = candidates.filter(d => d.group >= 4 || d.is_dead || d.rec.toUpperCase().includes('CUT')).reduce((s,d) => s+d.value, 0);
  document.getElementById('totals-bar').innerHTML = [
    `<div class="total-item"><span class="meta-label">Всего в портфеле: </span><span class="meta-val">${fmt_usd(totalVal)}</span></div>`,
    `<div class="total-item"><span class="meta-label">G4/5 + DEAD + CUT: </span><span style="color:#f85149;font-weight:600">${fmt_usd(cutVal)}</span></div>`,
    `<div class="total-item"><span class="meta-label">Позиций: </span><span class="meta-val">${candidates.length}</span></div>`,
  ].join('');

  document.getElementById('results-title').textContent =
    `Продать → купить ${target} | ${candidates.length} позиций | сверху самые слабые`;

  // Table
  const tbody = document.getElementById('rot-body');
  tbody.innerHTML = '';
  candidates.forEach((d, i) => {
    const delta = tScore - d.score;
    const deltaHtml = delta > 0
      ? `<span class="delta-pos">+${delta}</span>`
      : `<span class="delta-neg">${delta}</span>`;
    const priority = d.group >= 4 || d.is_dead ? '🔴' : d.group === 3 ? '🟡' : '🟢';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${priority} ${i+1}</td>
      <td class="td-ticker ${GC[d.group]||'g3-c'}">${d.ticker}</td>
      <td class="td-value">${fmt_usd(d.value)}</td>
      <td>${pnl_html(d.pnl_pct)}</td>
      <td class="${GC[d.group]||'g3-c'}">${GL[d.group]||`G${d.group}`}</td>
      <td>${score_html(d.score, d.group)}</td>
      <td>${tgt ? deltaHtml : '-'}</td>
      <td>${rec_badge(d)}</td>
      <td>${sig_num_html(d.sig_num)}</td>
      <td>${rsi_html(d.rsi_1d)}</td>
      <td>${rsi_html(d.rsi_1w)}</td>
      <td>${z90_html(d.z90)}</td>
      <td>${rs_html(d.rs7)}</td>
      <td>${rs_html(d.rs30)}</td>
      <td>${signal_html(d.signal||'-')}</td>
      <td class="td-screen">${d.screen||'-'}</td>
      <td class="td-va">${d.value_accrual !== 'нет' ? '✓ '+d.value_accrual : '<span style="color:#6e7681">—</span>'}</td>
      <td class="td-thesis" title="${d.thesis}">${d.thesis||''}</td>`;
    tbody.appendChild(tr);
  });

  res.classList.add('visible');
  document.getElementById('updated-ts').textContent =
    'Данные: ' + '2026-07-24 00:15 UTC';
}

// Auto-render if hash
const hashTicker = window.location.hash.replace('#','').toUpperCase();
if (hashTicker && byTicker[hashTicker]) {
  input.value = hashTicker;
  render(hashTicker);
}
</script>
</body>
</html>
